server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_static on;

    # Forward /api requests to the Express backend
    location /api {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Larger body for base64 image uploads
        client_max_body_size 25m;
    }

    # SPA fallback — every non-asset route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever (Vite adds content hashes to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
